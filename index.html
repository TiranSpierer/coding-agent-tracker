<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coding Agent Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.25rem; }
    .subtitle { color: #94a3b8; font-size: 0.875rem; margin-bottom: 1.5rem; }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-start;
      margin-bottom: 1.5rem;
    }
    .control-group { display: flex; flex-direction: column; gap: 0.375rem; }
    .control-group label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }

    select {
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      font-size: 0.875rem;
      cursor: pointer;
      color-scheme: dark;
    }
    select:hover { border-color: #475569; }

    .agents {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .agent-toggle {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.375rem 0.75rem;
      border-radius: 999px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e2e8f0;
      cursor: pointer;
      font-size: 0.8125rem;
      user-select: none;
    }
    .agent-toggle:hover { border-color: #475569; }
    .agent-toggle.active { border-color: var(--agent-color); background: color-mix(in srgb, var(--agent-color) 15%, #1e293b); }
    .agent-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--agent-color);
    }

    .date-inputs {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    input[type="date"] {
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      font-size: 0.875rem;
      color-scheme: dark;
    }
    input[type="date"]:hover { border-color: #475569; }
    .date-sep { color: #475569; }

    .chart-container {
      background: #1e293b;
      border-radius: 12px;
      padding: 1.5rem;
      position: relative;
      height: 60vh;
      min-height: 300px;
    }
    .loading {
      text-align: center;
      padding: 4rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <h1>Coding Agent Tracker</h1>
  <p class="subtitle">Daily Reddit community stats for AI coding agents</p>

  <div class="controls">
    <div class="control-group">
      <label>Metric</label>
      <select id="metric">
        <option value="members">Members</option>
        <option value="weekly_visitors" selected>Weekly Visitors</option>
        <option value="weekly_contributions">Weekly Contributions</option>
      </select>
    </div>

    <div class="control-group">
      <label>Date Range</label>
      <div class="date-inputs">
        <input type="date" id="dateFrom">
        <span class="date-sep">to</span>
        <input type="date" id="dateTo">
      </div>
    </div>

    <div class="control-group">
      <label>Agents</label>
      <div class="agents" id="agentToggles"></div>
    </div>
  </div>

  <div class="chart-container">
    <canvas id="chart"></canvas>
  </div>

  <div class="loading" id="loading">Loading data...</div>

  <script>
    const AGENTS = {
      ClaudeCode:        { label: 'Claude Code',    color: '#f97316' },
      codex:             { label: 'Codex',           color: '#ef4444' },
      cursor:            { label: 'Cursor',          color: '#a855f7' },
      GithubCopilot:     { label: 'GitHub Copilot',  color: '#10b981' },
      google_antigravity:{ label: 'Antigravity',     color: '#eab308' },
      windsurf:          { label: 'Windsurf',        color: '#06b6d4' },
      CLine:             { label: 'Cline',           color: '#3b82f6' },
    };

    const METRIC_LABELS = {
      members: 'Members',
      weekly_visitors: 'Weekly Visitors',
      weekly_contributions: 'Weekly Contributions',
    };

    let allRows = [];
    let allDates = [];
    let activeAgents = new Set(Object.keys(AGENTS));
    let chart = null;

    function parseCSV(text) {
      const lines = text.trim().split('\n');
      const rows = lines.slice(1).map(line => {
        const [date, time_utc, subreddit, members, weekly_visitors, weekly_contributions] = line.split(',');
        return { date, subreddit, members: +members, weekly_visitors: +weekly_visitors, weekly_contributions: +weekly_contributions };
      });
      // If multiple batches share the same date, keep only the last one
      const seen = new Map();
      for (const row of rows) {
        const key = `${row.date}|${row.subreddit}`;
        seen.set(key, row);
      }
      return [...seen.values()];
    }

    function getFiltered() {
      const metric = document.getElementById('metric').value;
      const from = document.getElementById('dateFrom').value;
      const to = document.getElementById('dateTo').value;

      let rows = allRows;
      if (from) rows = rows.filter(r => r.date >= from);
      if (to) rows = rows.filter(r => r.date <= to);

      const dates = [...new Set(rows.map(r => r.date))].sort();

      const datasets = [...activeAgents].map(sub => {
        const agent = AGENTS[sub];
        return {
          label: agent.label,
          data: rows
            .filter(r => r.subreddit === sub)
            .map(r => ({ x: r.date, y: r[metric] })),
          borderColor: agent.color,
          backgroundColor: agent.color,
          borderWidth: 2,
          pointRadius: dates.length > 60 ? 0 : 3,
          pointHoverRadius: 6,
          tension: 0.3,
          spanGaps: true,
        };
      });

      return { datasets, metric };
    }

    function updateChart() {
      const { datasets, metric } = getFiltered();

      if (chart) {
        chart.data.datasets = datasets;
        chart.options.scales.y.title.text = METRIC_LABELS[metric];
        chart.update('none');
      } else {
        chart = new Chart(document.getElementById('chart'), {
          type: 'line',
          data: { datasets },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: '#0f172a',
                titleColor: '#e2e8f0',
                bodyColor: '#cbd5e1',
                borderColor: '#334155',
                borderWidth: 1,
                callbacks: {
                  label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y?.toLocaleString() ?? 'N/A'}`,
                },
              },
            },
            scales: {
              x: {
                type: 'time',
                time: { unit: 'day', tooltipFormat: 'MMM d, yyyy' },
                ticks: { color: '#64748b', maxTicksLimit: 20 },
                grid: { color: 'rgba(255,255,255,0.05)' },
              },
              y: {
                title: { display: true, text: METRIC_LABELS[metric], color: '#64748b' },
                ticks: {
                  color: '#64748b',
                  callback: v => v >= 1_000_000 ? `${(v / 1_000_000).toFixed(1)}M` : v >= 1000 ? `${(v / 1000).toFixed(0)}k` : v,
                },
                grid: { color: 'rgba(255,255,255,0.05)' },
              },
            },
          },
        });
      }
    }

    function buildAgentToggles() {
      const container = document.getElementById('agentToggles');
      for (const [key, agent] of Object.entries(AGENTS)) {
        const btn = document.createElement('button');
        btn.className = 'agent-toggle active';
        btn.style.setProperty('--agent-color', agent.color);
        btn.innerHTML = `<span class="agent-dot"></span>${agent.label}`;
        btn.addEventListener('click', () => {
          if (activeAgents.has(key)) {
            activeAgents.delete(key);
            btn.classList.remove('active');
          } else {
            activeAgents.add(key);
            btn.classList.add('active');
          }
          updateChart();
        });
        container.appendChild(btn);
      }
    }

    async function init() {
      try {
        const res = await fetch('reddit-stats.csv');
        const text = await res.text();
        allRows = parseCSV(text);
        allDates = [...new Set(allRows.map(r => r.date))].sort();

        document.getElementById('loading').style.display = 'none';

        const dateFrom = document.getElementById('dateFrom');
        const dateTo = document.getElementById('dateTo');
        dateFrom.min = allDates[0];
        dateFrom.max = allDates[allDates.length - 1];
        dateTo.min = allDates[0];
        dateTo.max = allDates[allDates.length - 1];
        dateFrom.value = allDates[0];
        dateTo.value = allDates[allDates.length - 1];

        buildAgentToggles();

        document.getElementById('metric').addEventListener('change', updateChart);
        document.getElementById('dateFrom').addEventListener('change', updateChart);
        document.getElementById('dateTo').addEventListener('change', updateChart);

        updateChart();
      } catch (err) {
        document.getElementById('loading').textContent = `Error: ${err.message}`;
      }
    }

    init();
  </script>
</body>
</html>
