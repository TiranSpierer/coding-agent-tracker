name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths: [index.html, reddit-stats.csv]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            index.html
            reddit-stats.csv
          sparse-checkout-cone-mode: false

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Archive artifact
        run: tar --dereference --hard-dereference --directory . -cvf "$RUNNER_TEMP/artifact.tar" --exclude=.git --exclude=.github .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
